<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Missing Piece | Lune Store</title>
    <link
      rel="icon"
      type="image/png"
      href="/images/favicon-dark.png"
      id="favicon"
    />

    <script>
      (function () {
        try {
          var currentTheme = localStorage.getItem("lune-theme") || "dark";
          document.documentElement.setAttribute("data-theme", currentTheme);
        } catch (e) {}
      })();
    </script>

    <link rel="stylesheet" href="/src/styles/main.scss" />
    <style>
      html {
        background-color: var(--bg-body, #101014);
      }
    </style>
  </head>
  <body>
    <header id="header" class="scrolled">
      <div class="header-container">
        <a href="index.html" class="header-logo">
          <img
            src="/images/nav-bar-dark.png"
            alt="Lune"
            class="logo-img logo-dark"
            loading="lazy"
          />
          <img
            src="/images/nav-bar.png"
            alt="Lune"
            class="logo-img logo-light"
            loading="lazy"
          />
        </a>

        <nav class="header-nav" id="mobile-nav">
          <div class="nav-header">
            <button
              class="burger-btn active"
              id="burger-close"
              aria-label="Close menu"
            >
              <span></span><span></span><span></span>
            </button>
          </div>

          <ul class="nav-list">
            <li><a href="index.html" class="nav-link">Home</a></li>
            <li class="separator">/</li>
            <li><a href="catalog.html" class="nav-link">Shop</a></li>
            <li class="separator">/</li>
            <li><span class="current-page">404</span></li>
          </ul>
        </nav>

        <div class="header-actions">
          <button
            class="burger-btn"
            id="burger-btn"
            aria-label="Toggle menu"
            aria-expanded="false"
          >
            <span></span>
            <span></span>
            <span></span>
          </button>

          <a href="login.html" class="icon-btn" aria-label="Account">
            <svg
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.5"
            >
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
              <circle cx="12" cy="7" r="4"></circle>
            </svg>
          </a>

          <button class="icon-btn" id="theme-toggle" aria-label="Toggle theme">
            <svg
              class="sun-icon"
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.2"
            >
              <circle cx="12" cy="12" r="5"></circle>
              <line x1="12" y1="1" x2="12" y2="3"></line>
              <line x1="12" y1="21" x2="12" y2="23"></line>
              <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
              <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
              <line x1="1" y1="12" x2="3" y2="12"></line>
              <line x1="21" y1="12" x2="23" y2="12"></line>
              <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
              <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
            </svg>
          </button>
        </div>
      </div>
    </header>

    <main class="page-offset container error-page-main">
      <div class="error-content-wrapper">
        <span class="error-code">404</span>
        <h1 class="error-title">The Missing Piece</h1>
        <p class="error-text">
          This piece is temporarily missing from our current collection.<br />
          The page you are looking for might have been moved, renamed, or no
          longer exists.
        </p>
        <div class="error-actions">
          <a href="catalog.html" class="btn-primary error-btn">
            <span>Return to Collection</span>
          </a>
        </div>
      </div>
    </main>

    <footer class="footer is-minimal" id="contacts">
      <div class="footer-container footer-layout">
        <div class="footer-center">
          <div class="footer_socials">
            <a
              href="https://facebook.com/lune_store"
              target="_blank"
              rel="noopener noreferrer"
              aria-label="Facebook"
            >
              <svg class="footer_socials-icon" width="30" height="30">
                <use href="./images/icons.svg#icon-facebook"></use>
              </svg>
            </a>
            <a
              href="https://instagram.com/lune_store"
              target="_blank"
              rel="noopener noreferrer"
              aria-label="Instagram"
            >
              <svg class="footer_socials-icon" width="30" height="30">
                <use href="./images/icons.svg#icon-instagram"></use>
              </svg>
            </a>
          </div>
          <nav class="footer-legal">
            <a href="terms.html" class="legal-link">Terms of Use</a>
            <a href="privacy.html" class="legal-link">Privacy Policy</a>
          </nav>
        </div>

        <div class="footer-right">
          <p class="footer-copyright">
            All rights reserved. Lune. &copy; <span id="year"></span>
          </p>
        </div>
      </div>
    </footer>

    <script src="https://unpkg.com/lenis@1.1.14/dist/lenis.min.js"></script>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
